<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baby StoneFruit Settings</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 24px; background: #f5f5f5; color: #222; }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p.lead { margin: 0 0 24px; color: #666; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; margin-top: 16px; color: #333; }
  input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; background: #fff; }
  button { width: 100%; margin-top: 24px; padding: 14px; font-size: 16px; font-weight: 600; background: #ff6900; color: #fff; border: 0; border-radius: 8px; }
  button.cancel { background: #e0e0e0; color: #333; margin-top: 8px; }
  small { color: #888; font-size: 12px; }
</style>
</head>
<body>
  <h1>Baby StoneFruit</h1>
  <p class="lead">Sign in with your Huckleberry account to log feedings and diaper changes from your Pebble.</p>

  <label for="email">Huckleberry email</label>
  <input id="email" type="email" autocomplete="email" autocapitalize="none" autocorrect="off">

  <label for="password">Huckleberry password</label>
  <input id="password" type="password" autocomplete="current-password">

  <small>Credentials are stored only on your phone and sent to the proxy server over HTTPS to log events.</small>

  <button id="save" type="button">Save</button>
  <button id="cancel" type="button" class="cancel">Cancel</button>

<script>
  function getQueryParam(name) {
    var m = location.search.match(new RegExp("[?&]" + name + "=([^&]+)"));
    return m ? decodeURIComponent(m[1]) : "";
  }
  var returnTo = getQueryParam("return_to") || "pebblejs://close#";

  // Pre-fill from existing settings if relaunched.
  try {
    var existing = JSON.parse(getQueryParam("current") || "{}");
    if (existing.huckleberryEmail && existing.huckleberryEmail.value) {
      document.getElementById("email").value = existing.huckleberryEmail.value;
    }
    if (existing.huckleberryPassword && existing.huckleberryPassword.value) {
      document.getElementById("password").value = existing.huckleberryPassword.value;
    }
  } catch (e) {}

  document.getElementById("save").addEventListener("click", function () {
    var settings = {
      huckleberryEmail: { value: document.getElementById("email").value.trim() },
      huckleberryPassword: { value: document.getElementById("password").value }
    };
    location.href = returnTo + encodeURIComponent(JSON.stringify(settings));
  });

  document.getElementById("cancel").addEventListener("click", function () {
    location.href = returnTo;
  });
</script>
</body>
</html>
